version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: pulsenotify_postgres

    environment:
      POSTGRES_DB: pulsenotify
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5434:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pulsenotify_redis

    ports:
      - "6379:6379"

volumes:
  postgres_data: